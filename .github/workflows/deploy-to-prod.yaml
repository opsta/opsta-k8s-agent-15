name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Semantic version tag (e.g., v1.0.0, v1.0.1, v1.1.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  security_scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version_tag }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Bandit SAST Scan
        run: uvx bandit -r app/

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Production
    needs: security_scan
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency: production
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version_tag }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

      - name: Install dependencies
        run: uv sync --locked

      - name: Deploy to Production (Agent Runtime)
        run: |
          uvx google-agents-cli@1.1.0 deploy \
            --project ${{ vars.PROD_PROJECT_ID }} \
            --region asia-southeast1 \
            --min-instances 0 \
            --service-account=${{ vars.APP_SERVICE_ACCOUNT_PROD }} \
            --update-env-vars="COMMIT_SHA=${{ github.sha }},RELEASE_TAG=${{ inputs.version_tag }},LOGS_BUCKET_NAME=${{ vars.LOGS_BUCKET_NAME_PROD }}"
